<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Avançando no CSS3</title>
    <link rel="stylesheet" href="style.css">

<!-- CSS external-> é emportando de ntro do head(arquivo separado) -->

    <style>
        /* CSS Internal-> é escrito dentro da tag head */
        /* A arvore DOM define a hierarquia dos elemntos do meu CSS */
        header p{
            color: chocolate;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <!-- CSS Inline ->é escrito dentro da tag -->
         <!-- Um é mais importante que o outro -->
        <h1 style="text-align: center; color: rgb(209, 123, 37);">CSS Inline, Intrenal e External</h1>
        <p>Esse são os 3 tipos de CSS</p>
    </header>
    <p id="texto">Este é o outro parágrafo.Filho do body, irmão do header </p>
    <p class="destaque">Este parágrafo possui uuma classe chamada "destaque"</p>
</body>
</html>
